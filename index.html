<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team OOO Calendar</title>
<style>
  :root {
    --primary: #0052CC;
    --primary-light: #DEEBFF;
    --primary-dark: #003884;
    --bg: #FAFBFC;
    --card: #FFFFFF;
    --border: #DFE1E6;
    --text: #172B4D;
    --text-light: #6B778C;
    --danger: #DE350B;
    --danger-light: #FFEBE6;
    --success: #00875A;
    --success-light: #E3FCEF;
    --purple: #6554C0;
    --purple-light: #EAE6FF;
    --teal: #00B8D9;
    --teal-light: #E6FCFF;
    --yellow: #FF991F;
    --yellow-light: #FFFAE6;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(9,30,66,0.13);
    --shadow-lg: 0 8px 16px rgba(9,30,66,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app-header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow-lg);
  }

  .app-header svg {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .app-header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .app-header p {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 2px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Calendar Navigation ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 12px 0;
  }

  .cal-nav button {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    color: var(--primary);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .cal-nav button:hover {
    background: var(--primary-light);
    border-color: var(--primary);
  }

  .cal-nav .month-label {
    font-size: 20px;
    font-weight: 700;
    min-width: 220px;
    text-align: center;
    color: var(--text);
  }

  .btn-today {
    font-size: 12px !important;
    padding: 6px 14px !important;
    color: var(--text-light) !important;
  }

  /* ── Calendar Grid ── */
  .calendar-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-grid .day-header {
    background: #F4F5F7;
    padding: 10px 4px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-light);
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }

  .cal-grid .day-cell {
    min-height: 90px;
    border: 1px solid #EBECF0;
    padding: 4px;
    position: relative;
    background: var(--card);
    transition: background 0.12s;
    overflow: hidden;
  }

  .cal-grid .day-cell.outside {
    background: #F9FAFB;
  }

  .cal-grid .day-cell.today {
    background: #F0F7FF;
  }

  .day-num {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    padding: 2px 6px;
    display: inline-block;
    border-radius: 50%;
    line-height: 1.6;
  }

  .day-cell.today .day-num {
    background: var(--primary);
    color: white;
  }

  .day-cell.outside .day-num {
    color: #C1C7D0;
  }

  .ooo-tag {
    display: block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 3px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.5;
  }

  /* Color palette for different people */
  .ooo-color-0 { background: var(--primary-light); color: var(--primary); }
  .ooo-color-1 { background: var(--purple-light); color: var(--purple); }
  .ooo-color-2 { background: var(--teal-light); color: #006C86; }
  .ooo-color-3 { background: var(--danger-light); color: var(--danger); }
  .ooo-color-4 { background: var(--success-light); color: var(--success); }
  .ooo-color-5 { background: var(--yellow-light); color: #A35D00; }
  .ooo-color-6 { background: #F3E8FF; color: #7C3AED; }
  .ooo-color-7 { background: #FFF1E6; color: #C2410C; }

  .more-tag {
    font-size: 9px;
    color: var(--text-light);
    padding: 1px 5px;
    cursor: default;
    font-weight: 600;
  }

  /* ── Stats Bar ── */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat-card {
    flex: 1;
    min-width: 150px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stat-icon.blue { background: var(--primary-light); }
  .stat-icon.green { background: var(--success-light); }
  .stat-icon.orange { background: var(--yellow-light); }

  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--text-light); margin-top: 1px; }

  /* ── Entry Form ── */
  .entry-section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px;
  }

  .entry-section h2 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 160px;
  }

  .form-group label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .form-group input {
    padding: 9px 12px;
    border: 2px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    color: var(--text);
    transition: border-color 0.15s;
    outline: none;
    font-family: inherit;
  }

  .form-group input:focus {
    border-color: var(--primary);
  }

  .btn-add {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    height: 40px;
  }

  .btn-add:hover { background: var(--primary-dark); }

  .error-msg {
    color: var(--danger);
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }

  /* ── OOO Table ── */
  .table-section {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .table-header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .table-header h2 {
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .filter-group {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-group select, .filter-group input {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    font-family: inherit;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: #F4F5F7;
    padding: 12px 24px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--text-light);
    letter-spacing: 0.5px;
    border-bottom: 2px solid var(--border);
  }

  tbody td {
    padding: 12px 24px;
    font-size: 14px;
    border-bottom: 1px solid #EBECF0;
    vertical-align: middle;
  }

  tbody tr:hover { background: #FAFBFC; }

  .name-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .status-active { background: var(--danger-light); color: var(--danger); }
  .status-upcoming { background: var(--primary-light); color: var(--primary); }
  .status-past { background: #F4F5F7; color: var(--text-light); }

  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--danger);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-delete:hover {
    background: var(--danger-light);
    border-color: var(--danger);
  }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-light);
  }

  .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  .duration-cell {
    color: var(--text-light);
    font-size: 13px;
  }

  @media (max-width: 768px) {
    .container { padding: 16px; }
    .form-row { flex-direction: column; }
    .form-group { min-width: 100%; }
    .cal-grid .day-cell { min-height: 60px; }
    .ooo-tag { font-size: 8px; }
    .stats-bar { flex-direction: column; }
    .filter-group { flex-wrap: wrap; }
    .table-header { flex-direction: column; gap: 12px; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="app-header">
  <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="rgba(255,255,255,0.15)"/><path d="M10 12h16M10 18h16M10 24h10" stroke="white" stroke-width="2" stroke-linecap="round"/><circle cx="27" cy="24" r="4" fill="#4C9AFF"/><path d="M27 22v4M25 24h4" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
  <div>
    <h1>Team OOO Calendar</h1>
    <p>Track out-of-office days across the team</p>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon blue">📅</div>
      <div><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total OOO Entries</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">🏖️</div>
      <div><div class="stat-value" id="statActive">0</div><div class="stat-label">Currently OOO</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">👥</div>
      <div><div class="stat-value" id="statPeople">0</div><div class="stat-label">People This Month</div></div>
    </div>
  </div>

  <!-- Calendar -->
  <div>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">◀ Previous</button>
      <button class="btn-today" onclick="goToday()">Today</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="changeMonth(1)">Next ▶</button>
    </div>
    <div class="calendar-card">
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- Entry Form -->
  <div class="entry-section">
    <h2>➕ Add OOO Entry</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Team Member Name</label>
        <input type="text" id="inputName" placeholder="e.g. Ankit Mehra" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Leave Start Date</label>
        <input type="date" id="inputStart" />
      </div>
      <div class="form-group">
        <label>Leave End Date</label>
        <input type="date" id="inputEnd" />
      </div>
      <button class="btn-add" onclick="addEntry()">Add Entry</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <div class="table-header">
      <h2>📋 OOO Records</h2>
      <div class="filter-group">
        <select id="filterStatus" onchange="renderTable()">
          <option value="all">All Statuses</option>
          <option value="active">Currently OOO</option>
          <option value="upcoming">Upcoming</option>
          <option value="past">Past</option>
        </select>
        <input type="text" id="filterName" placeholder="Search name…" oninput="renderTable()" />
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Team Member</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Duration</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect x="6" y="10" width="36" height="28" rx="4" stroke="#B3BAC5" stroke-width="2"/><path d="M6 18h36" stroke="#B3BAC5" stroke-width="2"/><circle cx="16" cy="8" r="2" fill="#B3BAC5"/><circle cx="32" cy="8" r="2" fill="#B3BAC5"/></svg>
      <p>No OOO entries yet. Add one above to get started!</p>
    </div>
  </div>

</div>

<script>
  // ── State ──
  let entries = [];
  let currentYear, currentMonth; // 0-indexed month

  const COLORS = [
    '#0052CC','#6554C0','#00B8D9','#DE350B',
    '#00875A','#FF991F','#7C3AED','#C2410C'
  ];

  // Assign a stable color index per unique name
  const nameColorMap = {};
  let nextColor = 0;
  function colorFor(name) {
    const key = name.trim().toLowerCase();
    if (!(key in nameColorMap)) {
      nameColorMap[key] = nextColor % 8;
      nextColor++;
    }
    return nameColorMap[key];
  }

  // ── Init ──
  (function init() {
    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth();

    // Load from localStorage
    const saved = localStorage.getItem('ooo_entries');
    if (saved) {
      try { entries = JSON.parse(saved); } catch(e) { entries = []; }
      // rebuild color map
      entries.forEach(e => colorFor(e.name));
    }

    render();
  })();

  function persist() {
    localStorage.setItem('ooo_entries', JSON.stringify(entries));
  }

  // ── Navigation ──
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    render();
  }

  function goToday() {
    const today = new Date();
    currentYear = today.getFullYear();
    currentMonth = today.getMonth();
    render();
  }

  // ── Add Entry ──
  function addEntry() {
    const name = document.getElementById('inputName').value.trim();
    const start = document.getElementById('inputStart').value;
    const end = document.getElementById('inputEnd').value;
    const errEl = document.getElementById('errorMsg');

    if (!name || !start || !end) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }
    if (new Date(end) < new Date(start)) {
      errEl.textContent = 'End date cannot be before start date.';
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    colorFor(name);
    entries.push({ id, name, start, end });
    persist();

    // Clear form
    document.getElementById('inputName').value = '';
    document.getElementById('inputStart').value = '';
    document.getElementById('inputEnd').value = '';

    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    persist();
    render();
  }

  // ── Helpers ──
  function fmtDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function daysBetween(a, b) {
    return Math.round((new Date(b) - new Date(a)) / 86400000) + 1;
  }

  function entryStatus(e) {
    const today = new Date(); today.setHours(0,0,0,0);
    const s = new Date(e.start + 'T00:00:00');
    const en = new Date(e.end + 'T00:00:00');
    if (today >= s && today <= en) return 'active';
    if (s > today) return 'upcoming';
    return 'past';
  }

  function initials(name) {
    return name.split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
  }

  // ── Render ──
  function render() {
    renderCalendar();
    renderTable();
    renderStats();
  }

  function renderCalendar() {
    const grid = document.getElementById('calGrid');
    const label = document.getElementById('monthLabel');
    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    label.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

    const today = new Date(); today.setHours(0,0,0,0);

    // Build OOO lookup for this month view
    const oooMap = {}; // day -> [{name, colorIdx}]
    entries.forEach(e => {
      const s = new Date(e.start + 'T00:00:00');
      const en = new Date(e.end + 'T00:00:00');
      // iterate each day of entry
      for (let d = new Date(s); d <= en; d.setDate(d.getDate() + 1)) {
        if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
          const day = d.getDate();
          if (!oooMap[day]) oooMap[day] = [];
          // avoid duplicate name on same day
          if (!oooMap[day].find(x => x.name === e.name)) {
            oooMap[day].push({ name: e.name, colorIdx: colorFor(e.name) });
          }
        }
      }
    });

    let html = '';
    const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    dayHeaders.forEach(d => { html += `<div class="day-header">${d}</div>`; });

    // Previous month fill
    for (let i = firstDay - 1; i >= 0; i--) {
      const d = prevMonthDays - i;
      html += `<div class="day-cell outside"><span class="day-num">${d}</span></div>`;
    }

    // Current month
    for (let d = 1; d <= daysInMonth; d++) {
      const cellDate = new Date(currentYear, currentMonth, d);
      const isToday = cellDate.getTime() === today.getTime();
      html += `<div class="day-cell${isToday ? ' today' : ''}">`;
      html += `<span class="day-num">${d}</span>`;
      if (oooMap[d]) {
        const MAX_SHOW = 2;
        oooMap[d].slice(0, MAX_SHOW).forEach(o => {
          html += `<span class="ooo-tag ooo-color-${o.colorIdx}" title="${o.name}">${o.name}</span>`;
        });
        if (oooMap[d].length > MAX_SHOW) {
          html += `<span class="more-tag">+${oooMap[d].length - MAX_SHOW} more</span>`;
        }
      }
      html += `</div>`;
    }

    // Next month fill
    const totalCells = firstDay + daysInMonth;
    const remaining = (7 - (totalCells % 7)) % 7;
    for (let d = 1; d <= remaining; d++) {
      html += `<div class="day-cell outside"><span class="day-num">${d}</span></div>`;
    }

    grid.innerHTML = html;
  }

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    const filterStatus = document.getElementById('filterStatus').value;
    const filterName = document.getElementById('filterName').value.trim().toLowerCase();

    let filtered = entries.filter(e => {
      if (filterStatus !== 'all' && entryStatus(e) !== filterStatus) return false;
      if (filterName && !e.name.toLowerCase().includes(filterName)) return false;
      return true;
    });

    // Sort: active first, then upcoming, then past; within group by start date
    const order = { active: 0, upcoming: 1, past: 2 };
    filtered.sort((a, b) => {
      const sa = order[entryStatus(a)], sb = order[entryStatus(b)];
      if (sa !== sb) return sa - sb;
      return new Date(a.start) - new Date(b.start);
    });

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    let html = '';
    filtered.forEach(e => {
      const st = entryStatus(e);
      const ci = colorFor(e.name);
      const days = daysBetween(e.start, e.end);
      html += `<tr>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${COLORS[ci]}">${initials(e.name)}</div>
            <span>${e.name}</span>
          </div>
        </td>
        <td>${fmtDate(e.start)}</td>
        <td>${fmtDate(e.end)}</td>
        <td class="duration-cell">${days} day${days > 1 ? 's' : ''}</td>
        <td><span class="status-badge status-${st}">${st === 'active' ? 'OOO Now' : st.charAt(0).toUpperCase() + st.slice(1)}</span></td>
        <td><button class="btn-delete" onclick="deleteEntry('${e.id}')">Remove</button></td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  function renderStats() {
    const today = new Date(); today.setHours(0,0,0,0);
    document.getElementById('statTotal').textContent = entries.length;
    document.getElementById('statActive').textContent = entries.filter(e => entryStatus(e) === 'active').length;

    // Unique people OOO this displayed month
    const peopleThisMonth = new Set();
    entries.forEach(e => {
      const s = new Date(e.start + 'T00:00:00');
      const en = new Date(e.end + 'T00:00:00');
      const monthStart = new Date(currentYear, currentMonth, 1);
      const monthEnd = new Date(currentYear, currentMonth + 1, 0);
      if (s <= monthEnd && en >= monthStart) {
        peopleThisMonth.add(e.name.toLowerCase());
      }
    });
    document.getElementById('statPeople').textContent = peopleThisMonth.size;
  }
</script>

</body>
</html>
